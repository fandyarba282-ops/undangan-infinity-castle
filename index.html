<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan - Infinity Castle</title>
    <style>
        /* --- RESET & DASAR --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            font-family: 'Cinzel', 'Segoe UI', Serif;
            background-color: #0d0804;
            color: #ffffff;
        }

        /* --- CONTAINER COVER UTAMA --- */
        #cover-infinity {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- STRUKTUR PINTU GESER DENGAN GAMBAR ASLI --- */
        .shoji-door {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            box-sizing: border-box;
            transition: transform 1.5s cubic-bezier(0.77, 0, 0.175, 1);
            z-index: 1;
            background-image: url('pintu.jpg'); 
            background-size: 100vw 100vh;
            background-repeat: no-repeat;
        }

        .door-left {
            left: 0;
            background-position: left center;
            border-right: 1px solid rgba(0, 0, 0, 0.6);
            box-shadow: inset -10px 0 20px rgba(0,0,0,0.5);
        }

        .door-right {
            right: 0;
            background-position: right center;
            border-left: 1px solid rgba(0, 0, 0, 0.6);
            box-shadow: inset 10px 0 20px rgba(0,0,0,0.5);
        }

        /* --- KONTEN OVERLAY (LOGO & TOMBOL) --- */
        .cover-content {
            position: relative;
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            width: 90%;
            max-width: 350px;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        /* Logo Utama Pernikahan */
        .wedding-logo {
            width: 100%;
            max-width: 210px;
            height: auto;
            filter: contrast(1.1) drop-shadow(0 5px 12px rgba(0, 0, 0, 0.75)) drop-shadow(0 0 8px rgba(255, 0, 0, 0.3));
            animation: pulseGlow 3s infinite alternate;
        }

        /* Kotak Informasi Tamu (Luxury Black & Gold Transparent) */
        .guest-box {
            background: rgba(13, 8, 4, 0.65); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255, 136, 0, 0.7); 
            padding: 12px 16px;
            border-radius: 6px;
            width: 100%;
            max-width: 240px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.65), 0 0 15px rgba(255, 123, 0, 0.15); 
        }

        .guest-box p {
            font-size: 10px;
            color: #ffb86c; 
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
            font-weight: 600;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.9);
        }

        .guest-box .guest-name {
            font-size: 15px;
            color: #ffffff;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.95);
        }

        /* Tombol Buka Undangan */
        .btn-open {
            background: #660000;
            color: #ffffff;
            border: 2px solid #ff7b00;
            padding: 10px 24px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(255, 123, 0, 0.3);
            transition: all 0.3s ease;
        }
        .btn-open:hover {
            background: #800000;
            box-shadow: 0 0 25px rgba(255, 123, 0, 0.6);
            transform: scale(1.03);
        }

        /* --- KELAS ANIMASI AKTIVASI (VIA JAVASCRIPT) --- */
        .fade-out-content {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }

        .open-left-door {
            transform: translateX(-100%);
        }
        .open-right-door {
            transform: translateX(100%);
        }

        .remove-cover {
            display: none !important;
        }

        /* --- HALAMAN ISI UNDANGAN (DI BALIK PINTU) --- */
        #main-invitation {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            background: radial-gradient(circle, #26170b 0%, #050301 100%);
        }
        .inner-content {
            max-width: 600px;
            animation: fadeInWelcome 2s ease forwards;
            opacity: 0;
        }
        .inner-content h1 {
            color: #ff7b00;
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255,123,0,0.4);
        }

        /* --- TOMBOL KONTROL MUSIK MELAYANG --- */
        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 999;
            width: 44px;
            height: 44px;
            background: rgba(13, 8, 4, 0.7);
            border: 1.5px solid #ff7b00;
            border-radius: 50%;
            color: #ffffff;
            font-size: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            visibility: hidden;
            opacity: 0;
        }
        .music-control.show {
            visibility: visible;
            opacity: 1;
        }
        .music-control:hover {
            transform: scale(1.1);
            background: #660000;
        }

        .rotate-music {
            animation: spinning 4s linear infinite;
        }

        /* --- ANIMASI KEYFRAMES --- */
        @keyframes pulseGlow {
            0% { filter: contrast(1.1) drop-shadow(0 5px 12px rgba(0, 0, 0, 0.75)) drop-shadow(0 0 8px rgba(255, 0, 0, 0.3)); }
            100% { filter: contrast(1.1) drop-shadow(0 5px 12px rgba(0, 0, 0, 0.75)) drop-shadow(0 0 20px rgba(255, 123, 0, 0.45)); }
        }
        @keyframes fadeInWelcome {
            to { opacity: 1; }
        }
        @keyframes spinning {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <audio id="teng-sound" src="teng.mp3" preload="auto"></audio>
    <audio id="bg-music" src="musik-isi.mp3" loop preload="auto"></audio>

    <button id="music-btn" class="music-control" onclick="toggleMusik()">🎵</button>

    <div id="cover-infinity">
        <div class="shoji-door door-left" id="left-door"></div>
        <div class="shoji-door door-right" id="right-door"></div>

        <div class="cover-content" id="interactive-content">
            <img src="cover.jpg" alt="The Wedding of Zenitsu & Nezuko" class="wedding-logo">
            
            <div class="guest-box">
                <p>Kepada Yth. Bapak/Ibu/Saudara/i</p>
                <div class="guest-name" id="guest-target">Nama Tamu Undangan</div>
            </div>

            <button class="btn-open" onclick="bukaUndanganKastil()">
                🚪 Buka Undangan
            </button>
        </div>
    </div>

    <main id="main-invitation">
        <div class="inner-content">
            <h1>Selamat Datang di Aula Utama</h1>
            <p>Bagian isi undangan digital bertema Infinity Castle Anda akan dimulai dari sini...</p>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const namaTamu = urlParams.get('to');
        if (namaTamu) {
            document.getElementById('guest-target').innerText = namaTamu;
        }

        const suaraTeng = document.getElementById('teng-sound');
        const musikIsi = document.getElementById('bg-music');
        const tombolMusik = document.getElementById('music-btn');

        function bukaUndanganKastil() {
            const konten = document.getElementById('interactive-content');
            const pintuKiri = document.getElementById('left-door');
            const pintuKanan = document.getElementById('right-door');
            const coverUtama = document.getElementById('cover-infinity');

            // 1. Putar efek suara "Teng!" secara instan begitu tombol diklik
            suaraTeng.play().catch(error => console.log("Audio pembuka terblokir"));

            // 2. Hilangkan teks dan tombol cover secara perlahan
            konten.classList.add('fade-out-content');

            // 3. Pintu Shoji mulai bergeser membuka pada milidetik ke-600
            setTimeout(() => {
                pintuKiri.classList.add('open-left-door');
                pintuKanan.classList.add('open-right-door');
            }, 600);

            // 4. Sinkronisasi Sempurna: Musik baru berputar setelah pintu terbuka penuh (2100ms)
            setTimeout(() => {
                coverUtama.classList.add('remove-cover');

                // Musik latar dan tombol kontrol dipicu tepat saat tirai cover dibongkar
                musikIsi.play().then(() => {
                    tombolMusik.classList.add('show', 'rotate-music');
                }).catch(error => {
                    console.log("Musik latar diblokir sistem browser");
                    tombolMusik.classList.add('show');
                });
            }, 2100); 
        }

        function toggleMusik() {
            if (musikIsi.paused) {
                musikIsi.play();
                tombolMusik.classList.add('rotate-music');
                tombolMusik.innerText = "🎵";
            } else {
                musikIsi.pause();
                tombolMusik.classList.remove('rotate-music');
                tombolMusik.innerText = "🔇";
            }
        }
    </script>
</body>
</html>
